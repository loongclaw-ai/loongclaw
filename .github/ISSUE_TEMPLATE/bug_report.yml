name: Bug Report
description: Report a reproducible bug.
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide a minimal reproducible case.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main@<sha> or release tag
    validations:
      required: true
  - type: dropdown
    id: track
    attributes:
      label: Contribution track impact
      description: Which track is most likely affected?
      options:
        - Track A (routine/low-risk)
        - Track B (higher-risk/policy-impacting)
    validations:
      required: true
