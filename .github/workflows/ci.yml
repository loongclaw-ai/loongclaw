name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c676846f29d98ff6b0106d3608c7ffd4048af17b

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features --locked

      - name: Dependency graph contract
        run: ./scripts/check_dep_graph.sh

      - name: Strict architecture contract
        run: LOONGCLAW_ARCH_STRICT=true ./scripts/check_architecture_boundaries.sh

      - name: Docs build
        run: cargo doc --workspace --no-deps
