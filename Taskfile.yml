version: "3"

tasks:
  fmt:
    desc: Check formatting for all crates
    cmds:
      - cargo fmt --all -- --check

  lint:
    desc: Run clippy across workspace targets
    cmds:
      - cargo clippy --workspace --all-targets --all-features

  lint:strict:
    desc: Run clippy with warnings denied (migration gate)
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    desc: Run workspace unit and doc tests
    cmds:
      - cargo test --workspace

  test:all-features:
    desc: Run tests with all features enabled
    cmds:
      - cargo test --workspace --all-features

  smoke:
    desc: Run representative spec-runner smoke scenarios
    cmds:
      - cargo run -p loongclaw-daemon --bin loongclawd -- run-spec --spec examples/spec/runtime-extension.json --print-audit
      - cargo run -p loongclaw-daemon --bin loongclawd -- run-spec --spec examples/spec/tool-search.json --print-audit
      - cargo run -p loongclaw-daemon --bin loongclawd -- run-spec --spec examples/spec/programmatic-tool-call.json --print-audit

  benchmark:pressure:
    desc: Run programmatic pressure benchmark with gate enforcement
    cmds:
      - ./scripts/benchmark_programmatic_pressure.sh

  verify:
    desc: Canonical local verification gate
    cmds:
      - task: fmt
      - task: lint
      - task: test

  verify:full:
    desc: Extended verification including smoke and benchmark gates
    cmds:
      - task: verify
      - task: lint:strict
      - task: test:all-features
      - task: smoke
      - task: benchmark:pressure
